<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXORA | Digital Universe</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
</head>
<body>

    <!-- Світлові плями на фоні -->
    <div class="aurora-bg">
        <div class="blob purple"></div>
        <div class="blob blue"></div>
        <div class="blob orange"></div>
    </div>

    <div class="main-container">
        <header>
            <img src="logo.png" alt="NEXORA" class="main-logo">
        </header>

        <section class="hero">
            <h1 class="main-title">NEXORA</h1>
            <p class="subtitle">МАЙБУТНЄ ЦИФРОВОГО СВІТУ</p>
            
            <div class="feature-grid">
                <div class="glass-box">
                    <span class="icon">✦</span>
                    <h3>Innovation</h3>
                </div>
                <div class="glass-box">
                    <span class="icon">⚡</span>
                    <h3>Speed</h3>
                </div>
                <div class="glass-box">
                    <span class="icon">◈</span>
                    <h3>AI Power</h3>
                </div>
            </div>
        </section>
    </div>
    <div class="logo-container">
                <img src="logo.png" alt="Nexora Logo" class="logo-3d">
            </div>
</body>
</html>
